services:
  localstack:
    image: localstack/localstack:3.8.1
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb,s3,lambda,apigateway,ecr,events,cloudformation,iam,sts,logs,s3control,ssm,sqs
      DEBUG: "0"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  localstack-data: